<!DOCTYPE html>
{% load static %}

<html lang="pt-br">
<head>
	<meta charset="utf-8" />
	<title>MOVER | Acessar</title>
	<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
	<meta content="" name="description" />
	<meta content="" name="author" />

	<!-- ================== BEGIN core-css ================== -->
	<link href="{% static 'css/vendor.min.css' %}" rel="stylesheet" />
	<link href="{% static 'css/transparent/app.min.css' %}" rel="stylesheet" />
	<!-- ================== END core-css ================== -->
</head>
<body class='pace-top'>
	<!-- BEGIN page-cover -->
	<div class="app-cover"></div>
	<!-- END page-cover -->

	<!-- BEGIN #loader -->
	<div id="loader" class="app-loader">
		<span class="spinner"></span>
	</div>
	<!-- END #loader -->

	<!-- BEGIN #app -->
	<div id="app" class="app">
		<!-- BEGIN login -->
		<div class="login login-v1">
			<!-- BEGIN login-container -->
			<div class="login-container">
				<!-- BEGIN login-header -->
				<div class="login-header">
					<div class="brand">
						<div class="d-flex align-items-center">
							<a href="{% url 'home' %}"><span class=""></span> <b class="me-1">MOVER</b></a>| Login
						</div>
						<small>Movimento dos Empreendedores</small>
					</div>
					<div class="icon">
						<i class=""></i>
					</div>
				</div>
				<!-- END login-header -->
				<!-- BEGIN login-body -->
				<div class="login-body">
					<!-- BEGIN login-content -->
					<div class="login-content fs-13px">
						<form action="" method="POST">
							{% csrf_token %}
							<div class="form-floating mb-20px">
								<input type="email" class="form-control fs-13px h-50px" id="emailAddress" placeholder="Seu usuário" />
								<label for="emailAddress" class="d-flex align-items-center">Usuário</label>
							</div>
							<div class="form-floating mb-20px">
								<input type="password" class="form-control fs-13px h-50px" id="password1" placeholder="Sua senha" />
								<label for="" class="d-flex align-items-center">Senha</label>
							</div>
								<input type="hidden" name="next" value="">
								<button type="submit" class="btn btn-theme h-50px d-block w-100 btn-lg" style="background-color: green; color: white;">
								ENTRAR
								</button>

							<div class="form-check mb-20px">
								<input class="form-check-input" type="checkbox" value="" id="" />
								<label class="form-check-label" for="rememberMe">
								Lembrar meus acessos
								</label>
							</div>
							<div class="login-buttons">
								<button type="submit" class="btn btn-theme h-40px d-block w-100 btn-lg" style="background-color: red; color: white;">
									<a href="">GOOGLE</a>
								</button>

							</div>
							<div class="form-check mb-20px">
								<input class="form-check-input" type="checkbox" value="" id="remember" />
								<label class="form-check-label" for="rememberMe">
									Entrar com Google
								</label>
							</div>
							<div class="login-buttons">
								<button type="submit" class="btn btn-theme h-40px d-block w-100 btn-lg" style="background-color: blue; color: white;">
									<a href="">FACEBOOK</a>
								</button>

							</div>
							<div class="form-check mb-10px">
								<input class="form-check-input" type="checkbox" value="" id="rememberMe" />
								<label class="form-check-label" for="rememberMe">
									Entrar com Facebook
								</label>
							</div>
						</form>
					</div>
					<!-- END login-content -->
				</div>
				<!-- END login-body -->
			</div>
			<!-- END login-container -->
		</div>
		<!-- END login -->
	</div>
	<!-- ================== BEGIN core-js ================== -->
	<script src="{% static 'js/vendor.min.js' %}"></script>
	<script src="{% static 'js/app.min.js' %}"></script>
	<!-- ================== END core-js ================== -->

</body>
</html>
